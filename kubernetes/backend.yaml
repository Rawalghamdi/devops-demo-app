# backend deployment

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: rawanalghamdi/devops-demo-backend:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "demodb"
            - name: DB_USER
              value: "demouser"
            - name: DB_PASSWORD
              value: "demopassword"
            - name: PORT
              value: "3000"
          # liveness probe checks if the backend is still running
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: devops-demo
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
